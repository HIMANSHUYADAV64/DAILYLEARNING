name: Auto Commit Daily

on:
  schedule:
    - cron: "0 18 * * *"  # Runs daily (11:30 PM IST)
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update file
        run: |
          echo "Updated on $(date)" >> streak.txt

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto commit $(date)" || echo "No changes"
          git push
